server {
    listen 80;
    server_name localhost;

    # Where Nginx should look for your Vite build files
    root /usr/share/nginx/html;
    index index.html;

    # The Catch-All Routing Rule
    location / {
        # 1. Try to find the exact file (like a .css or .js file)
        # 2. Try to find a directory with that name
        # 3. FALLBACK: Hand them index.html and let React Router handle the URL
        try_files $uri $uri/ /index.html;
    }

    # Optional but recommended: Cache static assets to make your app load instantly
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}