version: '3.8'

services:
  # 1. The Redis Cache (For Rate Limiting)
  redis:
    image: redis:alpine
    container_name: cooperative_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # 2. Your FastAPI Backend
  backend:
    build: ./backend
    container_name: cooperative_backend
    ports:
      # Maps port 8000 on your Windows machine to port 80 inside the container 
      # (since your Dockerfile exposes port 80)
      - "8000:80"
    env_file:
      - ./backend/.env
    environment:
      # This tells your rate limiter to use the Redis container
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # CRITICAL: This is the persistent database volume!
      # It maps a folder named 'coop_db' on your computer to '/backend/data' in the container.
      - ./coop_db:/backend/data
    depends_on:
      - redis
    restart: unless-stopped

  # 3. Your React/Vite Frontend
  frontend:
    build: ./frontend
    container_name: cooperative_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped