version: '3.8'

services:
  # 1. THE NEW FRONT DOOR (Caddy)
  caddy:
    image: caddy:latest
    container_name: caddy_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: cooperative_redis
    restart: unless-stopped

  backend:
    image: alains04/coop-backend:latest
    container_name: cooperative_backend
    env_file: .env
    # We REMOVE the ports here because Caddy will talk to it internally
    restart: unless-stopped

  frontend:
    image: alains04/coop-frontend:latest
    container_name: cooperative_frontend
    # We REMOVE the ports here because Caddy will talk to it internally
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config: